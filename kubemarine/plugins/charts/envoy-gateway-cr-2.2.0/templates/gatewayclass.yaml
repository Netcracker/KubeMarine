{{- if .Values.gatewayClasses.internal }}
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: {{ .Values.gatewayClasses.internal.name }}
  labels:
  {{- include "eg.labels" . | nindent 4 }}
spec:
  controllerName: {{ index .Values "config" "envoyGateway" "gateway" "controllerName" }}
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: {{ .Values.gatewayClasses.internal.envoyProxy.name }}
    namespace: {{ .Release.Namespace }}
{{- end }}
---
{{- if .Values.gatewayClasses.external }}
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: {{ .Values.gatewayClasses.external.name }}
  labels:
  {{- include "eg.labels" . | nindent 4 }}
spec:
  controllerName: {{ index .Values "config" "envoyGateway" "gateway" "controllerName" }}
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: {{ .Values.gatewayClasses.external.envoyProxy.name }}
    namespace: {{ .Release.Namespace }}
{{- end }}
