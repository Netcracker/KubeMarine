node_defaults:
  keyfile: ~/.ssh/id_rsa
  username: runner

nodes:
- name: "node-all-in-one"
  address: "172.17.0.1"
  internal_address: "172.17.0.1"
  roles: ["control-plane", "worker"]

cluster_name: "test-local-k8s.com"

services:
  loadbalancer:
    target_ports:
      envoy_http: 21080
      envoy_https: 21443
  kubeadm:
    kubernetesVersion: '{{ env.KUBERNETES_VERSION }}'

plugins:

  calico:
    install: true
    apiserver:
      enabled: true

  nginx-ingress-controller:
    install: true

  envoy-gateway:
    install: true

  kubernetes-dashboard:
    install: true

  local-path-provisioner:
    install: true
