node_defaults:
  keyfile: "/home/username/.ssh/id_rsa"
  password: '{{ env.PASS }}'     #Either keyfile or password can be used.
  username: "centos"

nodes:
  - name: "k8s-control-plane"
    address: "10.101.0.1"
    internal_address: "192.168.0.1"
    # Optionally, if you want control-plane to run workloads,
    # you could use `roles: ["control-plane", "worker"]`
    roles: ["control-plane"]
  - name: "k8s-worker-1"
    address: "10.101.0.2"
    internal_address: "192.168.0.2"
    roles: ["worker"]
  - name: "k8s-worker-n"
    address: "10.101.0.99"
    internal_address: "192.168.0.99"
    roles: ["worker"]

# NodeSelector and Tolerations are required to make sure
# envoy-gateway/nginx-ingress runs on control-plane node
plugins:
  envoy-gateway:
    install: true
    externalGateway:
      certificate:
        cert: |
          -----BEGIN CERTIFICATE-----
          ----------------------------------------------------------------
          -----END CERTIFICATE-----
        key: |
          -----BEGIN RSA PRIVATE KEY-----
          ----------------------------------------------------------------
          -----END RSA PRIVATE KEY-----
    crValuesOverride:
      gatewayClasses:
        external:
          envoyDeployment:
            nodeSelector:
              node-role.kubernetes.io/control-plane: ""
            tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule

  nginx-ingress-controller:
    controller:
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"

cluster_name: "k8s.example.com"